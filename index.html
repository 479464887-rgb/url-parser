<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Url Parser — DevKit Tools</title><meta name="description" content="在线 URL 解析工具 - 分解 URL 的协议/主机/路径/参数"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}main{max-width:700px;margin:32px auto;padding:0 24px;flex:1}footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}footer a{color:#58a6ff;text-decoration:none;margin:0 8px}.ta{width:100%;padding:16px;font-size:13px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6}.ta:focus{border-color:#58a6ff}.btn{padding:10px 24px;font-size:13px;font-weight:600;border:1px solid #30363d;border-radius:8px;cursor:pointer;background:#21262d;color:#c9d1d9}.btn:hover{background:#30363d}.btn-p{background:#238636;border-color:#238636;color:#fff}.btn-p:hover{background:#2ea043}.actions{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center}.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:12px 0}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit</div><div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div></header><main><h1 style="font-size:24px;margin-bottom:4px">URL Parser</h1><p style="color:#8b949e;font-size:14px;margin-bottom:16px">在线 URL 解析工具 - 分解 URL 的协议/主机/路径/参数</p><div class="tool-wrapper"><div class="actions"><input id="up-input" placeholder="粘贴URL..." style="flex:1;padding:12px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;outline:none;font-family:mono" onkeydown="if(event.key==='Enter')parse()"><button class="btn btn-p" onclick="parse()">解析</button></div><div id="up-result" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-family:mono;font-size:13px"></div></div></main><footer><a href="https://github.com/479464887-rgb/url-parser">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script>function parseURL(){const u=document.getElementById('up-input').value.trim();const r=document.getElementById('up-result');if(!u){r.innerHTML='<span style=color:#8b949e>InputURL</span>';return}try{const p=new URL(u.startsWith('http')?u:'https://'+u);const fields={协议:p.protocol,主机:p.hostname,端口:p.port||'默认',路径名:p.pathname,Hash:p.hash||'(无)',用户名:p.username||'(无)',Password:p.password?'***':'(无)',Origin:p.origin};let h='';for(const[k,v]of Object.entries(fields))h+='<div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style=color:#8b949e>'+k+'</span><br><span style=color:#c9d1d9>'+v+'</span></div>';if(p.search){h+='<div style="grid-column:1/-1;margin-top:8px;font-size:12px;color:#8b949e">查询参数:</div>';p.searchParams.forEach((v,k)=>{h+='<div style="padding:8px 12px;background:#0d1117;border-radius:6px"><span style=color:#f0c040>'+k+'</span><br><span style=color:#c9d1d9">'+v+'</span></div>'})}r.innerHTML=h}catch(e){r.innerHTML='<span style=color:#f85149;grid-column:1/-1">❌ '+e.message+'</span>'}''}
parseURL()
</script></body></html>
